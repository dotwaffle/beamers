min_version = "2026.7.7"

[settings]
lockfile = true

[tool_alias]
govulncheck = "go:golang.org/x/vuln/cmd/govulncheck"
templ = "go:github.com/a-h/templ/cmd/templ"

[tools]
actionlint = "1.7.12"
atlas = "1.2.0"
buf = "1.72.0"
go = "1.26.5"
golangci-lint = "2.12.2"
govulncheck = "1.3.0"
"go:connectrpc.com/connect/cmd/protoc-gen-connect-go" = "1.20.0"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "1.36.11"
rumdl = "0.2.34"
templ = "0.3.906"

[tasks.format]
description = "Format Go and Markdown sources"
run = """
golangci-lint fmt
rumdl fmt .
"""

[tasks.lint]
description = "Run Go and Markdown static analysis"
run = """
actionlint
buf lint
golangci-lint run
rumdl check .
"""

[tasks.test]
description = "Run the complete Go race suite"
run = "go test -race ./..."

[tasks.vulncheck]
description = "Check Go dependencies for known vulnerabilities"
run = "govulncheck ./..."

[tasks.migrations]
description = "Validate migration checksums and Ent schema parity"
run = "sh scripts/check-migrations.sh"

[tasks.check]
description = "Run the canonical validation sweep"
depends = ["lint", "migrations", "test", "vulncheck"]
run = """
go vet ./...
go build ./...
"""
