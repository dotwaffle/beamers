min_version = "2026.7.7"

[settings]
lockfile = true

[tool_alias]
govulncheck = "go:golang.org/x/vuln/cmd/govulncheck"

[tools]
go = "1.26.5"
golangci-lint = "2.12.2"
govulncheck = "1.3.0"
rumdl = "0.2.34"

[tasks.format]
description = "Format Go and Markdown sources"
run = """
golangci-lint fmt
rumdl fmt .
"""

[tasks.lint]
description = "Run Go and Markdown static analysis"
run = """
golangci-lint run
rumdl check .
"""

[tasks.test]
description = "Run the complete Go race suite"
run = "go test -race ./..."

[tasks.vulncheck]
description = "Check Go dependencies for known vulnerabilities"
run = "govulncheck ./..."

[tasks.check]
description = "Run the canonical validation sweep"
depends = ["lint", "test", "vulncheck"]
run = """
go vet ./...
go build ./...
"""
