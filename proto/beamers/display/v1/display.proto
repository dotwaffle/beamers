syntax = "proto3";

package beamers.display.v1;

import "google/protobuf/timestamp.proto";
import "beamers/program/v1/program.proto";

option go_package = "github.com/dotwaffle/beamers/gen/beamers/display/v1;displayv1";

service DisplayService {
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  rpc Acknowledge(AcknowledgeRequest) returns (AcknowledgeResponse);
}

message GetSnapshotRequest {}

message GetSnapshotResponse {
  DisplaySnapshot snapshot = 1;
}

message DisplaySnapshot {
  string protocol_version = 1;
  google.protobuf.Timestamp server_time = 2;
  int64 display_id = 3;
  string display_name = 4;
  int64 active_event_id = 5;
  string event_name = 6;
  int64 activation_generation = 7;
  int64 published_revision = 8;
  int64 location_id = 9;
  string location_name = 10;
  string view_key = 11;
  bool standby = 12;
  repeated DisplaySession sessions = 13;
  string stream_id = 14;
  optional uint64 stream_position = 15;
  string event_timezone = 16;
  string snapshot_token = 17;
  string asset_version = 18;
  DisplayComposition composition = 19;
  StageTimer stage_timer = 20;
  beamers.program.v1.ProgramItem program_output = 21;
  int64 program_output_revision = 22;
  int64 program_channel_id = 23;
  DisplayOverride stage_message = 24;
  DisplayOverride technical_difficulties = 25;
}

message DisplayOverride {
  int64 id = 1;
  int64 revision = 2;
  string kind = 3;
  string text = 4;
  string emphasis = 5;
  bool until_cleared = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message DisplayComposition {
  DisplayLayout layout = 1;
  DisplayTheme theme = 2;
}

message DisplayLayout {
  string key = 1;
  uint32 rotation_seconds = 2;
  repeated DisplayRegion regions = 3;
}

message DisplayRegion {
  string name = 1;
  string widget = 2;
  bool persistent = 3;
}

message DisplayTheme {
  string branding = 1;
  string foreground_color = 2;
  string background_color = 3;
  string accent_color = 4;
  string background = 5;
  string scrim_color = 6;
  uint32 scrim_opacity = 7;
  string font = 8;
  string transition = 9;
}

message DisplaySession {
  int64 id = 1;
  string title = 2;
  string speaker = 3;
  string public_details = 4;
  google.protobuf.Timestamp forecast_start = 5;
  google.protobuf.Timestamp forecast_end = 6;
  string lifecycle = 7;
  int64 live_state_revision = 8;
  google.protobuf.Timestamp actual_start = 9;
  google.protobuf.Timestamp actual_end = 10;
  repeated int64 location_ids = 11;
  repeated int64 lane_ids = 12;
  repeated int64 track_ids = 13;
  bool unavailable = 14;
  string availability_message = 15;
}

enum StageTimerMode {
  STAGE_TIMER_MODE_UNSPECIFIED = 0;
  STAGE_TIMER_MODE_COUNTDOWN = 1;
  STAGE_TIMER_MODE_ELAPSED = 2;
}

enum TimerEmphasis {
  TIMER_EMPHASIS_UNSPECIFIED = 0;
  TIMER_EMPHASIS_NORMAL = 1;
  TIMER_EMPHASIS_ATTENTION = 2;
  TIMER_EMPHASIS_URGENT = 3;
}

message TimerThreshold {
  int64 remaining_seconds = 1;
  TimerEmphasis emphasis = 2;
}

message StageTimer {
  int64 session_id = 1;
  string title = 2;
  StageTimerMode mode = 3;
  google.protobuf.Timestamp anchor = 4;
  repeated TimerThreshold thresholds = 5;
  google.protobuf.Timestamp forecast_end = 6;
  sint64 adjustment_seconds = 7;
  google.protobuf.Timestamp adjustment_notice_expires_at = 8;
}

message AcknowledgeRequest {
  string protocol_version = 1;
  string stream_id = 2;
  uint64 stream_position = 3;
  int64 active_event_id = 4;
  int64 activation_generation = 5;
  int64 published_revision = 6;
  string snapshot_token = 7;
  bool standby = 8;
  sint64 clock_offset_milliseconds = 9;
  uint64 clock_uncertainty_milliseconds = 10;
  bool renderer_unstable = 11;
  string asset_version = 12;
  int64 stage_message_id = 13;
  int64 stage_message_revision = 14;
  int64 technical_difficulties_id = 15;
  int64 technical_difficulties_revision = 16;
}

message AcknowledgeResponse {
  DisplayAcknowledgment acknowledgment = 1;
}

message DisplayAcknowledgment {
  int64 display_id = 1;
  string protocol_version = 2;
  string stream_id = 3;
  uint64 stream_position = 4;
  int64 active_event_id = 5;
  int64 activation_generation = 6;
  int64 published_revision = 7;
  google.protobuf.Timestamp applied_at = 8;
  bool standby = 9;
  sint64 clock_offset_milliseconds = 10;
  uint64 clock_uncertainty_milliseconds = 11;
  bool renderer_unstable = 12;
  string asset_version = 13;
  int64 stage_message_id = 14;
  int64 stage_message_revision = 15;
  int64 technical_difficulties_id = 16;
  int64 technical_difficulties_revision = 17;
}
