syntax = "proto3";

package beamers.program.v1;

import "beamers/results/v1/results.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dotwaffle/beamers/gen/beamers/program/v1;programv1";

service ProgramControlService {
  rpc GetProgramChannel(GetProgramChannelRequest) returns (GetProgramChannelResponse);
  rpc ChangeControl(ChangeControlRequest) returns (ChangeControlResponse);
  rpc SelectPreview(SelectPreviewRequest) returns (SelectPreviewResponse);
  rpc Take(TakeRequest) returns (TakeResponse);
  rpc DeferEntry(DeferEntryRequest) returns (DeferEntryResponse);
  rpc ActOnResult(ActOnResultRequest) returns (ActOnResultResponse);
}

enum ProgramItemKind {
  PROGRAM_ITEM_KIND_UNSPECIFIED = 0;
  PROGRAM_ITEM_KIND_STANDBY = 1;
  PROGRAM_ITEM_KIND_UPCOMING = 2;
  PROGRAM_ITEM_KIND_STARTING = 3;
  PROGRAM_ITEM_KIND_ENTRY = 4;
  PROGRAM_ITEM_KIND_ENDING = 5;
  PROGRAM_ITEM_KIND_RESULT = 6;
}

enum ResultStageStatus {
  RESULT_STAGE_STATUS_UNSPECIFIED = 0;
  RESULT_STAGE_STATUS_PENDING = 1;
  RESULT_STAGE_STATUS_TAKEN = 2;
  RESULT_STAGE_STATUS_REVEALING = 3;
  RESULT_STAGE_STATUS_REVEALED = 4;
  RESULT_STAGE_STATUS_SKIPPED = 5;
}

message ProgramResult {
  beamers.results.v1.ResultItemRef item = 1;
  beamers.results.v1.RevealMethod reveal_method = 2;
  beamers.results.v1.RevealMethod reduced_motion_reveal_method = 3;
  uint64 reveal_seed = 4;
  ResultStageStatus status = 5;
  google.protobuf.Timestamp taken_at = 6;
  google.protobuf.Timestamp reveal_started_at = 7;
  google.protobuf.Duration reveal_duration = 8;
  google.protobuf.Timestamp reveal_completed_at = 9;
  google.protobuf.Timestamp skipped_at = 10;
  bool replay = 11;
  google.protobuf.Timestamp presentation_started_at = 12;
  google.protobuf.Duration presentation_duration = 13;
  beamers.results.v1.CompetitionResultsDraft competition_results = 14;
  beamers.results.v1.EventAward event_award = 15;
}

message ProgramItem {
  ProgramItemKind kind = 1;
  int64 entry_id = 2;
  string title = 3;
  bool retry = 4;
  ProgramResult result = 5;
}

message ControlOwner {
  int64 account_id = 1;
  string name = 2;
  bool connected = 3;
}

message ConsumingDisplay {
  int64 display_id = 1;
  string name = 2;
  string delivery_state = 3;
}

message ProgramChannel {
  int64 event_id = 1;
  int64 session_id = 2;
  string name = 3;
  int64 live_state_revision = 4;
  ControlOwner control_owner = 5;
  ControlOwner handover_requester = 6;
  ProgramItem previous = 7;
  ProgramItem current = 8;
  ProgramItem next = 9;
  ProgramItem preview = 10;
  ProgramItem program_output = 11;
  repeated ProgramItem items = 12;
  google.protobuf.Timestamp taken_at = 13;
  repeated ConsumingDisplay consuming_displays = 14;
  int64 control_state_revision = 15;
}

message GetProgramChannelRequest {
  int64 event_id = 1;
  int64 session_id = 2;
}

message GetProgramChannelResponse {
  ProgramChannel channel = 1;
}

enum ControlAction {
  CONTROL_ACTION_UNSPECIFIED = 0;
  CONTROL_ACTION_CLAIM = 1;
  CONTROL_ACTION_REQUEST_HANDOVER = 2;
  CONTROL_ACTION_HANDOVER = 3;
  CONTROL_ACTION_TAKEOVER = 4;
  CONTROL_ACTION_DISCONNECT = 5;
}

message ChangeControlRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  ControlAction action = 3;
  bool confirmed = 4;
  string command_id = 5;
  int64 expected_control_state_revision = 6;
}

message ChangeControlResponse {
  ProgramChannel channel = 1;
}

message SelectPreviewRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  ProgramItem item = 3;
  string command_id = 4;
  int64 expected_control_state_revision = 5;
}

message SelectPreviewResponse {
  ProgramChannel channel = 1;
}

message TakeRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  int64 expected_live_state_revision = 4;
  ProgramItem preview = 5;
  int64 expected_entry_order_revision = 6;
  string entry_order_fingerprint = 7;
  int64 expected_control_state_revision = 8;
}

message TakeResponse {
  ProgramChannel channel = 1;
}

message DeferEntryRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  int64 entry_id = 3;
  string command_id = 4;
  int64 expected_entry_revision = 5;
  int64 expected_program_revision = 6;
  int64 expected_control_state_revision = 7;
}

message DeferEntryResponse {
  ProgramChannel channel = 1;
}

enum ResultAction {
  RESULT_ACTION_UNSPECIFIED = 0;
  RESULT_ACTION_REVEAL = 1;
  RESULT_ACTION_COMPLETE_REVEAL = 2;
  RESULT_ACTION_REPLAY_REVEAL = 3;
  RESULT_ACTION_SKIP_TO_FINAL = 4;
  RESULT_ACTION_SKIP_FROM_STAGE = 5;
}

message ActOnResultRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  ResultAction action = 4;
  ProgramItem item = 5;
  int64 expected_program_revision = 6;
  int64 expected_control_state_revision = 7;
}

message ActOnResultResponse {
  ProgramChannel channel = 1;
}
