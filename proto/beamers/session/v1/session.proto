syntax = "proto3";

package beamers.session.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/duration.proto";
import "beamers/rundown/v1/rundown.proto";

option go_package = "github.com/dotwaffle/beamers/gen/beamers/session/v1;sessionv1";

service SessionControlService {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc EndSession(EndSessionRequest) returns (EndSessionResponse);
  rpc CancelSession(CancelSessionRequest) returns (CancelSessionResponse);
  rpc PreviewReinstateSession(PreviewReinstateSessionRequest) returns (PreviewReinstateSessionResponse);
  rpc ReinstateSession(ReinstateSessionRequest) returns (ReinstateSessionResponse);
  rpc PreviewAdjustTarget(PreviewAdjustTargetRequest) returns (PreviewAdjustTargetResponse);
  rpc AdjustTarget(AdjustTargetRequest) returns (AdjustTargetResponse);
  rpc PreviewPullForward(PreviewPullForwardRequest) returns (PreviewPullForwardResponse);
  rpc PullForward(PullForwardRequest) returns (PullForwardResponse);
  rpc CorrectLiveDetails(CorrectLiveDetailsRequest) returns (CorrectLiveDetailsResponse);
  rpc GetSessionHistory(GetSessionHistoryRequest) returns (GetSessionHistoryResponse);
}

enum SessionLifecycle {
  SESSION_LIFECYCLE_UNSPECIFIED = 0;
  SESSION_LIFECYCLE_SCHEDULED = 1;
  SESSION_LIFECYCLE_LIVE = 2;
  SESSION_LIFECYCLE_ENDED = 3;
  SESSION_LIFECYCLE_CANCELED = 4;
}

enum SessionRunOutcome {
  SESSION_RUN_OUTCOME_UNSPECIFIED = 0;
  SESSION_RUN_OUTCOME_COMPLETED = 1;
  SESSION_RUN_OUTCOME_CANCELED = 2;
}

message StartSessionRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
}

message EndSessionRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
}

message CancelSessionRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
  bool confirmed = 5;
  string public_cancellation_message = 6;
  string crew_notes = 7;
}

message PreviewReinstateSessionRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  google.protobuf.Timestamp forecast_start = 3;
  repeated int64 lane_ids = 4;
  repeated int64 location_ids = 5;
}

message ReinstateSessionRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
  google.protobuf.Timestamp forecast_start = 5;
  repeated int64 lane_ids = 6;
  repeated int64 location_ids = 7;
  string preview_fingerprint = 8;
  bool confirmed = 9;
  bool hard_boundary_confirmed = 10;
}

message PreviewAdjustTargetRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  oneof adjustment {
    google.protobuf.Duration preset = 3;
    google.protobuf.Duration custom = 4;
  }
}

message AdjustTargetRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
  oneof adjustment {
    google.protobuf.Duration preset = 5;
    google.protobuf.Duration custom = 6;
  }
  string preview_fingerprint = 7;
  bool confirmed = 8;
  bool hard_boundary_confirmed = 9;
}

message PreviewPullForwardRequest {
  int64 event_id = 1;
  int64 session_id = 2;
}

message PullForwardRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
  string preview_fingerprint = 5;
  bool confirmed = 6;
}

message CorrectLiveDetailsRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  optional int64 expected_live_state_revision = 4;
  bool confirmed = 5;
  string title = 6;
  string speaker = 7;
  string public_details = 8;
  google.protobuf.FieldMask update_mask = 9;
}

message GetSessionHistoryRequest {
  int64 event_id = 1;
  int64 session_id = 2;
}

message StartSessionResponse {
  SessionState state = 1;
}

message EndSessionResponse {
  SessionState state = 1;
}

message CancelSessionResponse {
  SessionState state = 1;
}

message TargetEffect {
  int64 session_id = 1;
  google.protobuf.Duration current_overlap = 2;
  google.protobuf.Duration proposed_overlap = 3;
  google.protobuf.Timestamp current_forecast_start = 4;
  google.protobuf.Timestamp current_forecast_end = 5;
  google.protobuf.Timestamp proposed_forecast_start = 6;
  google.protobuf.Timestamp proposed_forecast_end = 7;
}

message ForecastChange {
  int64 session_id = 1;
  google.protobuf.Timestamp forecast_start = 2;
  google.protobuf.Timestamp forecast_end = 3;
}

message PreviewAdjustTargetResponse {
  google.protobuf.Timestamp current_target = 1;
  google.protobuf.Timestamp proposed_target = 2;
  google.protobuf.Duration adjustment = 3;
  repeated TargetEffect effects = 4;
  bool requires_hard_boundary_confirmation = 5;
  string preview_fingerprint = 6;
  repeated google.protobuf.Duration configured_presets = 7;
}

message AdjustTargetResponse {
  SessionState state = 1;
  google.protobuf.Timestamp forecast_end = 2;
  google.protobuf.Duration adjustment = 3;
  google.protobuf.Timestamp adjusted_at = 4;
  repeated ForecastChange changes = 5;
}

message PreviewPullForwardResponse {
  repeated TargetEffect effects = 1;
  repeated ForecastChange changes = 2;
  string preview_fingerprint = 3;
}

message PullForwardResponse {
  SessionState state = 1;
  repeated ForecastChange changes = 2;
}

message PreviewReinstateSessionResponse {
  repeated TargetEffect effects = 1;
  repeated ForecastChange changes = 2;
  repeated int64 current_lane_ids = 3;
  repeated int64 proposed_lane_ids = 4;
  repeated int64 current_location_ids = 5;
  repeated int64 proposed_location_ids = 6;
  bool requires_hard_boundary_confirmation = 7;
  string preview_fingerprint = 8;
}

message ReinstateSessionResponse {
  SessionState state = 1;
  repeated ForecastChange changes = 2;
  google.protobuf.Timestamp previous_forecast_start = 3;
}

message CorrectLiveDetailsResponse {
  SessionState state = 1;
  int64 amendment_id = 2;
  SessionDetails details = 3;
}

message GetSessionHistoryResponse {
  repeated SessionRunHistory runs = 1;
  repeated SessionCancellationHistory cancellations = 2;
}

message SessionDetails {
  string title = 1;
  string speaker = 2;
  string public_details = 3;
}

message RunAmendment {
  int64 id = 1;
  SessionDetails details = 2;
  repeated string changed_fields = 3;
  google.protobuf.Timestamp created_at = 4;
}

message SessionRunHistory {
  int64 id = 1;
  google.protobuf.Timestamp actual_start = 2;
  google.protobuf.Timestamp actual_end = 3;
  RunSnapshot snapshot = 4;
  repeated RunAmendment amendments = 5;
  SessionRunOutcome outcome = 6;
}

message SessionCancellationHistory {
  int64 id = 1;
  optional int64 session_run_id = 2;
  string public_cancellation_message = 3;
  string crew_notes = 4;
  google.protobuf.Timestamp forecast_start = 5;
  google.protobuf.Timestamp canceled_at = 6;
}

message RunSnapshot {
  int64 published_revision = 1;
  string title = 2;
  string speaker = 3;
  beamers.rundown.v1.SessionType type = 4;
  string public_details = 5;
  google.protobuf.Timestamp planned_start = 6;
  google.protobuf.Timestamp planned_end = 7;
  beamers.rundown.v1.TimingPolicy timing_policy = 8;
  google.protobuf.Duration minimum_duration = 9;
  beamers.rundown.v1.Boundary start_boundary = 10;
  beamers.rundown.v1.Boundary end_boundary = 11;
  repeated int64 lane_ids = 12;
  repeated int64 location_ids = 13;
  repeated int64 track_ids = 14;
}

message SessionState {
  int64 session_id = 1;
  int64 session_run_id = 2;
  SessionLifecycle lifecycle = 3;
  int64 live_state_revision = 4;
  google.protobuf.Timestamp actual_start = 5;
  google.protobuf.Timestamp actual_end = 6;
}
