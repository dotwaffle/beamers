syntax = "proto3";

package beamers.results.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dotwaffle/beamers/gen/beamers/results/v1;resultsv1";

service ResultsService {
  rpc GetCompetitionResultsDraft(GetCompetitionResultsDraftRequest) returns (GetCompetitionResultsDraftResponse);
  rpc SaveCompetitionResultsDraft(SaveCompetitionResultsDraftRequest) returns (SaveCompetitionResultsDraftResponse);
  rpc SaveCompetitionAwards(SaveCompetitionAwardsRequest) returns (SaveCompetitionAwardsResponse);
  rpc MarkCompetitionResultsReady(MarkCompetitionResultsReadyRequest) returns (MarkCompetitionResultsReadyResponse);
  rpc DesignatePrizegiving(DesignatePrizegivingRequest) returns (DesignatePrizegivingResponse);
  rpc GetEventAwardsDraft(GetEventAwardsDraftRequest) returns (GetEventAwardsDraftResponse);
  rpc SaveEventAwardsDraft(SaveEventAwardsDraftRequest) returns (SaveEventAwardsDraftResponse);
  rpc MarkEventAwardsReady(MarkEventAwardsReadyRequest) returns (MarkEventAwardsReadyResponse);
  rpc GetPrizegivingPlan(GetPrizegivingPlanRequest) returns (GetPrizegivingPlanResponse);
  rpc SavePrizegivingPlan(SavePrizegivingPlanRequest) returns (SavePrizegivingPlanResponse);
  rpc RunPrizegivingPreflight(RunPrizegivingPreflightRequest) returns (RunPrizegivingPreflightResponse);
  rpc PreviewPrizegiving(PreviewPrizegivingRequest) returns (PreviewPrizegivingResponse);
}

enum ResultsDisposition {
  RESULTS_DISPOSITION_UNSPECIFIED = 0;
  RESULTS_DISPOSITION_PENDING = 1;
  RESULTS_DISPOSITION_PUBLISH = 2;
  RESULTS_DISPOSITION_NO_PUBLIC_RESULTS = 3;
}

enum ResultStanding {
  RESULT_STANDING_UNSPECIFIED = 0;
  RESULT_STANDING_PLACED = 1;
  RESULT_STANDING_UNPLACED = 2;
}

enum ScoreType {
  SCORE_TYPE_UNSPECIFIED = 0;
  SCORE_TYPE_NONE = 1;
  SCORE_TYPE_DECIMAL = 2;
  SCORE_TYPE_DURATION = 3;
}

enum ScoreVisibility {
  SCORE_VISIBILITY_UNSPECIFIED = 0;
  SCORE_VISIBILITY_PUBLIC = 1;
  SCORE_VISIBILITY_CREW_ONLY = 2;
}

enum ScoreRequirement {
  SCORE_REQUIREMENT_UNSPECIFIED = 0;
  SCORE_REQUIREMENT_OPTIONAL = 1;
  SCORE_REQUIREMENT_REQUIRED = 2;
}

enum ScoreInterpretation {
  SCORE_INTERPRETATION_UNSPECIFIED = 0;
  SCORE_INTERPRETATION_HIGHER_WINS = 1;
  SCORE_INTERPRETATION_LOWER_WINS = 2;
  SCORE_INTERPRETATION_INFORMATIONAL = 3;
}

enum AwardReleasePathKind {
  AWARD_RELEASE_PATH_KIND_UNSPECIFIED = 0;
  AWARD_RELEASE_PATH_KIND_STANDALONE = 1;
  AWARD_RELEASE_PATH_KIND_PRIZEGIVING = 2;
}

enum ResultItemKind {
  RESULT_ITEM_KIND_UNSPECIFIED = 0;
  RESULT_ITEM_KIND_COMPETITION_RESULTS = 1;
  RESULT_ITEM_KIND_NO_PUBLIC_RESULTS = 2;
  RESULT_ITEM_KIND_COMPETITION_AWARD = 3;
  RESULT_ITEM_KIND_EVENT_AWARD = 4;
}

enum RevealMethod {
  REVEAL_METHOD_UNSPECIFIED = 0;
  REVEAL_METHOD_STATIC_RESULT = 1;
  REVEAL_METHOD_SEQUENTIAL_PODIUM = 2;
  REVEAL_METHOD_ANIMATED_SCORE_BARS = 3;
}

enum PrizegivingPreviewMode {
  PRIZEGIVING_PREVIEW_MODE_UNSPECIFIED = 0;
  PRIZEGIVING_PREVIEW_MODE_PREVIEW = 1;
  PRIZEGIVING_PREVIEW_MODE_REHEARSAL = 2;
}

message ScorePolicy {
  ScoreType type = 1;
  ScoreVisibility visibility = 2;
  string unit = 3;
  int32 precision = 4;
  ScoreRequirement requirement = 5;
  ScoreInterpretation interpretation = 6;
}

message ScoreValue {
  oneof value {
    string decimal = 1;
    google.protobuf.Duration duration = 2;
  }
}

message CompetitionResultStanding {
  int64 entry_id = 1;
  ResultStanding standing = 2;
  optional int64 placement = 3;
  int32 display_order = 4;
  ScoreValue score = 5;
}

message AwardRecipient {
  oneof recipient {
    int64 entry_id = 1;
    string display_name = 2;
  }
}

message CompetitionAward {
  string key = 1;
  string name = 2;
  repeated AwardRecipient recipients = 3;
  bool promoted = 4;
  int32 display_order = 5;
}

message AwardReleasePath {
  AwardReleasePathKind kind = 1;
  int64 prizegiving_session_id = 2;
}

message EventAward {
  string key = 1;
  string name = 2;
  repeated AwardRecipient recipients = 3;
  int32 display_order = 4;
  AwardReleasePath release_path = 5;
}

message EventAwardPathState {
  AwardReleasePath release_path = 1;
  int64 revision = 2;
  bool ready = 3;
  int64 ready_by_account_id = 4;
  google.protobuf.Timestamp ready_at = 5;
}

message CompetitionResultsDraft {
  int64 id = 1;
  int64 event_id = 2;
  int64 session_id = 3;
  int64 revision = 4;
  ResultsDisposition disposition = 5;
  string no_public_crew_reason = 6;
  string public_explanation = 7;
  ScorePolicy score = 8;
  repeated CompetitionResultStanding standings = 9;
  bool ready = 10;
  int64 ready_by_account_id = 11;
  google.protobuf.Timestamp ready_at = 12;
  int64 created_by_account_id = 13;
  google.protobuf.Timestamp created_at = 14;
  repeated CompetitionAward awards = 15;
}

message GetCompetitionResultsDraftRequest {
  int64 event_id = 1;
  int64 session_id = 2;
}

message GetCompetitionResultsDraftResponse {
  CompetitionResultsDraft draft = 1;
}

message SaveCompetitionResultsDraftRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  int64 expected_revision = 4;
  ResultsDisposition disposition = 5;
  string no_public_crew_reason = 6;
  string public_explanation = 7;
  ScorePolicy score = 8;
  repeated CompetitionResultStanding standings = 9;
}

message SaveCompetitionResultsDraftResponse {
  CompetitionResultsDraft draft = 1;
}

message SaveCompetitionAwardsRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  int64 expected_revision = 4;
  repeated CompetitionAward awards = 5;
}

message SaveCompetitionAwardsResponse {
  CompetitionResultsDraft draft = 1;
}

message MarkCompetitionResultsReadyRequest {
  int64 event_id = 1;
  int64 session_id = 2;
  string command_id = 3;
  int64 expected_revision = 4;
}

message MarkCompetitionResultsReadyResponse {
  CompetitionResultsDraft draft = 1;
}

message Prizegiving {
  int64 id = 1;
  int64 event_id = 2;
  int64 ceremony_session_id = 3;
  int64 created_by_account_id = 4;
  google.protobuf.Timestamp created_at = 5;
}

message DesignatePrizegivingRequest {
  int64 event_id = 1;
  int64 ceremony_session_id = 2;
  string command_id = 3;
}

message DesignatePrizegivingResponse {
  Prizegiving prizegiving = 1;
}

message EventAwardsDraft {
  int64 id = 1;
  int64 event_id = 2;
  int64 revision = 3;
  repeated EventAward awards = 4;
  repeated EventAwardPathState path_states = 5;
  int64 created_by_account_id = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetEventAwardsDraftRequest {
  int64 event_id = 1;
}

message GetEventAwardsDraftResponse {
  EventAwardsDraft draft = 1;
}

message SaveEventAwardsDraftRequest {
  int64 event_id = 1;
  string command_id = 2;
  int64 expected_revision = 3;
  repeated EventAward awards = 4;
}

message SaveEventAwardsDraftResponse {
  EventAwardsDraft draft = 1;
}

message MarkEventAwardsReadyRequest {
  int64 event_id = 1;
  string command_id = 2;
  int64 expected_revision = 3;
  AwardReleasePath release_path = 4;
  int64 expected_path_revision = 5;
}

message MarkEventAwardsReadyResponse {
  EventAwardsDraft draft = 1;
}

message ResultItemRef {
  ResultItemKind kind = 1;
  int64 competition_session_id = 2;
  string award_key = 3;
  int32 display_order = 4;
}

message ResultItem {
  ResultItemKind kind = 1;
  int64 competition_session_id = 2;
  string award_key = 3;
  int32 display_order = 4;
  RevealMethod reveal_method = 5;
}

message ResultsTextTemplate {
  int64 revision = 1;
  string source = 2;
}

message PrizegivingCompetitionLock {
  int64 session_id = 1;
  int64 draft_id = 2;
  int64 draft_revision = 3;
  ResultsDisposition disposition = 4;
}

message LockedResultItem {
  ResultItem item = 1;
  uint64 reveal_seed = 2;
}

message PrizegivingPreflightLock {
  int64 plan_revision = 1;
  repeated PrizegivingCompetitionLock competition_sources = 2;
  int64 event_awards_draft_revision = 3;
  int64 event_awards_path_revision = 4;
  repeated LockedResultItem sequence = 5;
  repeated ResultItemRef publication_order = 6;
  ResultsTextTemplate results_text_template = 7;
}

message PrizegivingPlan {
  int64 id = 1;
  int64 event_id = 2;
  int64 ceremony_session_id = 3;
  int64 revision = 4;
  repeated int64 competition_session_ids = 5;
  repeated ResultItem sequence = 6;
  repeated ResultItemRef publication_order = 7;
  ResultsTextTemplate results_text_template = 8;
  bool locked = 9;
  PrizegivingPreflightLock preflight_lock = 10;
  int64 locked_by_account_id = 11;
  google.protobuf.Timestamp locked_at = 12;
}

message GetPrizegivingPlanRequest {
  int64 event_id = 1;
  int64 ceremony_session_id = 2;
}

message GetPrizegivingPlanResponse {
  PrizegivingPlan plan = 1;
}

message SavePrizegivingPlanRequest {
  int64 event_id = 1;
  int64 ceremony_session_id = 2;
  string command_id = 3;
  int64 expected_revision = 4;
  repeated int64 competition_session_ids = 5;
  repeated ResultItem sequence = 6;
  repeated ResultItemRef publication_order = 7;
  ResultsTextTemplate results_text_template = 8;
}

message SavePrizegivingPlanResponse {
  PrizegivingPlan plan = 1;
}

message PrizegivingPreflightFinding {
  string code = 1;
  string message = 2;
}

message RunPrizegivingPreflightRequest {
  int64 event_id = 1;
  int64 ceremony_session_id = 2;
  string command_id = 3;
  int64 expected_revision = 4;
}

message RunPrizegivingPreflightResponse {
  PrizegivingPlan plan = 1;
  repeated PrizegivingPreflightFinding findings = 2;
}

message PreviewPrizegivingRequest {
  int64 event_id = 1;
  int64 ceremony_session_id = 2;
  PrizegivingPreviewMode mode = 3;
}

message PrizegivingPreview {
  PrizegivingPreviewMode mode = 1;
  string watermark = 2;
  PrizegivingPlan plan = 3;
}

message PreviewPrizegivingResponse {
  PrizegivingPreview preview = 1;
}
